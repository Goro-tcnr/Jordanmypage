<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喬登AI動漫學院｜0-6歲感統黃金陪伴計畫</title>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    font-family:"Microsoft JhengHei",sans-serif;
    background:#fffaf3;
    color:#444;
}

/* ===== Header ===== */
header{
    background:#ffd6a5;
    padding:15px 20px;
    display:flex;
    align-items:center;
}
header img{
    height:50px;
    margin-right:10px;
}
header h2{
    margin:0;
    font-size:20px;
}

/* ===== Banner ===== */
.banner{
    background:linear-gradient(to right,#caf0f8,#ade8f4);
    text-align:center;
    padding:60px 20px;
}
.banner h1{
    font-size:32px;
    color:#0077b6;
}
.banner p{
    font-size:18px;
}
.banner button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff8fab;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* ===== Section ===== */
section{
    padding:50px 20px;
    max-width:1100px;
    margin:auto;
}
.big-title{
    font-size:34px;
    text-align:center;
    color:#ff6b6b;
    margin-bottom:30px;
    font-weight:bold;
}

/* ===== Card Grid ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ===== Video Section ===== */
.video-wrapper{
    text-align:center;
}
.video-wrapper iframe{
    width:100%;
    max-width:700px;
    height:400px;
    border-radius:20px;
}

/* ===== Quiz ===== */
.quiz-box{
    background:#e7f5ff;
    padding:25px;
    border-radius:20px;
}
.quiz-box h3{
    margin-top:0;
}
.quiz-box label{
    display:block;
    margin:10px 0;
}
.quiz-box button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#69db7c;
    color:white;
    cursor:pointer;
}
.result{
    margin-top:20px;
    font-weight:bold;
}

/* ===== Footer ===== */
footer{
    background:#ffd6a5;
    text-align:center;
    padding:15px;
    font-size:14px;
}

/* ===== 手機優化 ===== */
@media(max-width:768px){
    .banner h1{
        font-size:24px;
    }
    .big-title{
        font-size:26px;
    }
    .video-wrapper iframe{
        height:220px;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="喬登AI動漫學院LOGO">
    <h2>喬登AI動漫學院</h2>
</header>

<div class="banner">
    <h1>🌿 在0-6歲黃金期，溫柔陪伴孩子成長</h1>
    <p>用動畫 × 遊戲 × 感統訓練建立學習力</p>
    <button onclick="alert('我們將與您聯繫安排體驗 🌼')">免費體驗</button>
</div>

<section>
    <div class="big-title">🌼 家長感統發展檢測小測驗</div>

    <div class="quiz-box">
        <h3>請勾選符合孩子的情況：</h3>

        <label><input type="checkbox" value="1"> 容易坐不住、愛跑跳</label>
        <label><input type="checkbox" value="1"> 容易情緒失控或哭鬧</label>
        <label><input type="checkbox" value="1"> 抄寫困難或看錯字</label>
        <label><input type="checkbox" value="1"> 對聲音特別敏感或聽不清指令</label>
        <label><input type="checkbox" value="1"> 寫字用力過大或太輕</label>
        <label><input type="checkbox" value="1"> 不喜歡特定衣服材質</label>

        <button onclick="calculateScore()">查看結果</button>

        <div class="result" id="result"></div>
    </div>
</section>

<section>
    <div class="big-title">🎥 溫暖陪伴影片介紹</div>
    <div class="video-wrapper">
        <!-- 可替換為您的影片連結 -->
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        frameborder="0" allowfullscreen></iframe>
    </div>
</section>

<section>
    <div class="big-title">🧸 孩子喜歡的學習方式</div>
    <div class="grid">
        <div class="card">
            🎮 AI動畫互動遊戲<br>
            在玩樂中刺激前庭覺與專注力
        </div>
        <div class="card">
            📚 點讀筆 + 點視功能<br>
            建立自然英文語感
        </div>
        <div class="card">
            🌈 沉浸式英文環境<br>
            讓孩子自然開口說英文
        </div>
        <div class="card">
            📘 108課綱素養能力銜接<br>
            幼兒到國中完整課程
        </div>
    </div>
</section>

<footer>
    🌿 喬登AI動漫學院｜長期陪伴客服支持｜免費更新12年課程
</footer>

<script>
function calculateScore(){
    let score = 0;
    document.querySelectorAll('input[type="checkbox"]:checked')
    .forEach(item => score += parseInt(item.value));

    let resultText = "";
    if(score <= 1){
        resultText = "🌼 發展狀況良好，持續觀察與陪伴即可。";
    }else if(score <= 3){
        resultText = "🌿 建議可加強感統刺激與專注訓練。";
    }else{
        resultText = "⚠️ 建議安排專業感統課程評估與引導。";
    }

    document.getElementById("result").innerText = resultText;
}
</script>

</body>
</html>
